services:
  - type: web
    name: catalyst-scout-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # Comma-separated list of allowed frontend origins for CORS.
      # Update this to your real Vercel domain after your first frontend deploy.
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,http://localhost:3000
